<script>
window.addEventListener("DOMContentLoaded", () => {
fetch("/check-session").then(r => r.json()).then(data => { if (!data.loggedIn) window.location.href = "/login"; }).catch(() => window.location.href = "/login");
loadRecommendations();

// Initial Theme Setup
const currentTheme = localStorage.getItem("theme") || "forest";
document.documentElement.setAttribute("data-theme", currentTheme);
// Theme Switcher Logic
document.querySelectorAll(".theme-controller").forEach((btn) => {
    btn.addEventListener("click", () => {
        const theme = btn.getAttribute("data-set-theme");
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
    });
});
});
function logout() {
fetch("/logout", { method: "POST" }).then(r => r.json()).then(data => { if (data.success) window.location.href = data.redirectUrl; }).catch(err => console.error("Logout error:", err));
}
async function loadRecommendations() {
try {
const res = await fetch("/api/ai-recommendations");
const data = await res.json();
const container = document.getElementById("recommendations");
const typeColors = {
lab: "border-primary/20 bg-primary/5 text-primary",
purpose: "border-secondary/20 bg-secondary/5 text-secondary",
lab_habit: "border-accent/20 bg-accent/5 text-accent",
welcome: "border-info/20 bg-info/5 text-info",
time: "border-warning/20 bg-warning/5 text-warning"
};
container.innerHTML = data.map(rec => `
<div class="card ${typeColors[rec.type] || typeColors.welcome} border transition-all hover:-translate-y-1">
<div class="card-body">
<div class="flex items-start gap-4">
<div class="w-12 h-12 rounded-xl bg-base-content/5 flex items-center justify-center shrink-0"><i class="fa-solid ${rec.icon} text-xl"></i></div>
<div>
<h3 class="card-title text-lg font-black">${rec.title}</h3>
<p class="text-sm opacity-80 mt-1">${rec.description}</p>
</div>
</div>
</div>
</div>
`).join("");
} catch (e) {
console.error("Recommendations load error:", e);
}
}
</script>
