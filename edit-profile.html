<!doctype html>
<html data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link

            rel="stylesheet"
            type="text/css"
        />

            href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
            rel="stylesheet"

        />
        <script

            rel="stylesheet"

    <body class="bg-base-200 min-h-screen">
        <div class="drawer">
            <input id="my-drawer" type="checkbox" class="drawer-toggle" />
            <div class="drawer-content flex flex-col">
                <div class="navbar bg-base-100/80 backdrop-blur-xl sticky top-0 z-[100] px-4 md:px-8 border-b border-base-content/10 shadow-sm shadow-base-content/5">
                    <div class="flex-none md:hidden">
                        <label for="my-drawer" class="btn btn-ghost btn-square">

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </label>
                    </div>
                    <div class="flex-1 gap-3 flex items-center">
                        <a href="javascript:history.back()" class="btn btn-ghost btn-sm hidden md:inline-flex">
                            <i class="fa-solid fa-arrow-left"></i>
                        </a>
                        <span class="text-xl font-black">Edit Profile</span>
                    </div>
                    <div class="hidden md:flex flex-none items-center gap-1">
                        <a href="/homepage" class="btn btn-ghost btn-sm">Home</a>
                        <a href="/student-history" class="btn btn-ghost btn-sm"><i class="fa-solid fa-clock-rotate-left mr-2 opacity-50"></i>History</a>
                        <a href="/leaderboard" class="btn btn-ghost btn-sm"><i class="fa-solid fa-trophy mr-2 opacity-50"></i>Leaderboard</a>
                        <a href="/ai-recommendations" class="btn btn-ghost btn-sm"><i class="fa-solid fa-robot mr-2 opacity-50"></i>AI Recs</a>
                        <a href="/lab-rules" class="btn btn-ghost btn-sm"><i class="fa-solid fa-gavel mr-2 opacity-50"></i>Rules</a>
                        <div class="dropdown dropdown-end ml-2">
                            <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
                                <div class="indicator">
                                    <i class="fa-solid fa-bell text-lg"></i>
                                    <span id="notif-bell-badge" class="badge badge-xs badge-primary indicator-item hidden"></span>
                                </div>
                            </div>
                            <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-80 p-4 shadow-2xl border border-base-content/10 mt-2">
                                <li class="menu-title font-bold text-base-content uppercase text-[10px] tracking-widest mb-2 px-0">Notifications</li>
                                <div id="notif-dropdown-list" class="max-h-60 overflow-y-auto">
                                    <li><a class="text-sm py-3 opacity-60 italic justify-center">No new notifications</a></li>
                                </div>
                            </ul>
                        </div>
                        <div class="dropdown dropdown-end ml-2">
                            <div tabindex="0" role="button" class="btn btn-ghost btn-sm gap-2">
                                <i class="fa-solid fa-palette opacity-50"></i>
                                <i class="fa-solid fa-chevron-down text-[10px] opacity-50"></i>
                            </div>
                            <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-52 p-2 shadow-2xl border border-base-content/10 mt-2 max-h-96 overflow-y-auto">
                                <li><button class="theme-controller" data-set-theme="light">Light</button></li>
                                <li><button class="theme-controller" data-set-theme="dark">Dark</button></li>
                                <li><button class="theme-controller" data-set-theme="cupcake">Cupcake</button></li>
                                <li><button class="theme-controller" data-set-theme="bumblebee">Bumblebee</button></li>
                                <li><button class="theme-controller" data-set-theme="emerald">Emerald</button></li>
                                <li><button class="theme-controller" data-set-theme="corporate">Corporate</button></li>
                                <li><button class="theme-controller" data-set-theme="synthwave">Synthwave</button></li>
                                <li><button class="theme-controller" data-set-theme="retro">Retro</button></li>
                                <li><button class="theme-controller" data-set-theme="cyberpunk">Cyberpunk</button></li>
                                <li><button class="theme-controller" data-set-theme="valentine">Valentine</button></li>
                                <li><button class="theme-controller" data-set-theme="halloween">Halloween</button></li>
                                <li><button class="theme-controller" data-set-theme="garden">Garden</button></li>
                                <li><button class="theme-controller" data-set-theme="forest">Forest</button></li>
                                <li><button class="theme-controller" data-set-theme="aqua">Aqua</button></li>
                                <li><button class="theme-controller" data-set-theme="lofi">Lofi</button></li>
                                <li><button class="theme-controller" data-set-theme="pastel">Pastel</button></li>
                                <li><button class="theme-controller" data-set-theme="fantasy">Fantasy</button></li>
                                <li><button class="theme-controller" data-set-theme="wireframe">Wireframe</button></li>
                                <li><button class="theme-controller" data-set-theme="black">Black</button></li>
                                <li><button class="theme-controller" data-set-theme="luxury">Luxury</button></li>
                                <li><button class="theme-controller" data-set-theme="dracula">Dracula</button></li>
                                <li><button class="theme-controller" data-set-theme="cmyk">Cmyk</button></li>
                                <li><button class="theme-controller" data-set-theme="autumn">Autumn</button></li>
                                <li><button class="theme-controller" data-set-theme="business">Business</button></li>
                                <li><button class="theme-controller" data-set-theme="acid">Acid</button></li>
                                <li><button class="theme-controller" data-set-theme="lemonade">Lemonade</button></li>
                                <li><button class="theme-controller" data-set-theme="night">Night</button></li>
                                <li><button class="theme-controller" data-set-theme="coffee">Coffee</button></li>
                                <li><button class="theme-controller" data-set-theme="winter">Winter</button></li>
                                <li><button class="theme-controller" data-set-theme="dim">Dim</button></li>
                                <li><button class="theme-controller" data-set-theme="nord">Nord</button></li>
                                <li><button class="theme-controller" data-set-theme="sunset">Sunset</button></li>
                                <li><button class="theme-controller" data-set-theme="caramellatte">Caramellatte</button></li>
                                <li><button class="theme-controller" data-set-theme="abyss">Abyss</button></li>
                                <li><button class="theme-controller" data-set-theme="silk">Silk</button></li>
                            </ul>
                        </div>
                        <button onclick="logout()" class="btn btn-primary btn-sm ml-4"><i class="fa-solid fa-right-from-bracket mr-2"></i>Logout</button>
                    </div>
                </div>

        <main
            class="p-4 md:p-8 max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-700"
        >
            <div
                class="card bg-base-100/80 backdrop-blur-xl shadow-xl shadow-base-content/5 border border-base-content/10"
            >
                <div class="card-body gap-6">
                    <!-- Profile Header -->
                    <div class="flex flex-col items-center gap-4 py-4">
                        <div
                            class="avatar group relative cursor-pointer"
                            onclick="
                                document
                                    .getElementById('profileImageUpload')
                                    .click()
                            "
                        >
                            <div
                                class="w-32 h-32 rounded-3xl ring ring-primary ring-offset-base-100 ring-offset-2 overflow-hidden transition-all duration-500 group-hover:scale-105 bg-base-200"
                            >
                                <img
                                    id="avatar-preview"
                                    src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky"
                                    class="w-full h-full object-cover"
                                />
                            </div>
                            <div
                                class="absolute inset-0 bg-base-content/40 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center text-base-100 rounded-3xl"
                            >
                                <i class="fa-solid fa-upload text-2xl"></i>
                            </div>
                        </div>
                        <input
                            type="file"
                            id="profileImageUpload"
                            accept="image/*"
                            class="hidden"
                            onchange="previewImage(event)"
                        />
                        <button
                            type="button"
                            class="btn btn-ghost btn-sm text-xs font-bold uppercase tracking-widest opacity-60 hover:opacity-100"
                            onclick="changeAvatar()"
                        >
                            Or Select Dicebear Avatar
                        </button>
                    </div>

                    <form
                        id="profileForm"
                        class="grid grid-cols-1 md:grid-cols-2 gap-4"
                    >
                        <!-- Basic Info -->
                        <div class="form-control w-full">
                            <label class="label"
                                ><span class="label-text font-bold"
                                    >First Name</span
                                ></label
                            >
                            <input
                                type="text"
                                id="firstName"
                                placeholder="Enter First Name"
                                class="input input-bordered w-full"
                                required
                            />
                        </div>
                        <div class="form-control w-full">
                            <label class="label"
                                ><span class="label-text font-bold"
                                    >Last Name</span
                                ></label
                            >
                            <input
                                type="text"
                                id="lastName"
                                placeholder="Enter Last Name"
                                class="input input-bordered w-full"
                                required
                            />
                        </div>
                        <div class="form-control w-full">
                            <label class="label"
                                ><span class="label-text font-bold"
                                    >Middle Name</span
                                ></label
                            >
                            <input
                                type="text"
                                id="middleName"
                                placeholder="Enter Middle Name (Optional)"
                                class="input input-bordered w-full"
                            />
                        </div>
                        <div class="form-control w-full">
                            <label class="label"
                                ><span class="label-text font-bold"
                                    >Email</span
                                ></label
                            >
                            <input
                                type="email"
                                id="email"
                                class="input input-bordered w-full"
                                required
                            />
                        </div>

                        <!-- Hidden role-specific fields will be shown via JS -->
                        <div
                            id="student-fields"
                            class="grid grid-cols-1 md:grid-cols-2 gap-4 col-span-1 md:col-span-2 hidden"
                        >
                            <div class="form-control w-full">
                                <label class="label"
                                    ><span class="label-text font-bold"
                                        >Course</span
                                    ></label
                                >
                                <input
                                    type="text"
                                    id="course"
                                    class="input input-bordered w-full"
                                />
                            </div>
                            <div class="form-control w-full">
                                <label class="label"
                                    ><span class="label-text font-bold"
                                        >Year Level</span
                                    ></label
                                >
                                <input
                                    type="text"
                                    id="courseLevel"
                                    class="input input-bordered w-full"
                                />
                            </div>
                            <div
                                class="form-control w-full col-span-1 md:col-span-2"
                            >
                                <label class="label"
                                    ><span class="label-text font-bold"
                                        >Address</span
                                    ></label
                                >
                                <textarea
                                    id="address"
                                    class="textarea textarea-bordered w-full"
                                ></textarea>
                            </div>
                        </div>

                        <input type="hidden" id="profilePic" />

                        <div class="col-span-1 md:col-span-2 pt-4">
                            <button
                                type="submit"
                                class="btn btn-primary w-full shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-1 transition-all duration-300"
                            >
                                <i class="fa-solid fa-save mr-2"></i>Save
                                Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <!-- Avatar Picker Modal -->
        <dialog id="avatar_modal" class="modal">
            <div class="modal-box max-w-md">
                <h3 class="font-bold text-lg mb-4 text-center">
                    Select an Avatar
                </h3>
                <div class="grid grid-cols-4 gap-4" id="avatar-grid">
                    <!-- Avatars will be injected here -->
                </div>
                <div class="modal-action">
                    <form method="dialog" class="w-full flex gap-2">
                        <input
                            type="text"
                            id="custom-avatar-url"
                            placeholder="Or paste image URL"
                            class="input input-bordered flex-1 input-sm"
                        />
                        <button
                            class="btn btn-sm btn-primary"
                            onclick="setAvatarFromUrl()"
                        >
                            Set
                        </button>
                        <button class="btn btn-sm">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

        <script>
            let currentUser = null;

            window.addEventListener("DOMContentLoaded", async () => {
                // Load theme
                document.documentElement.setAttribute(
                    "data-theme",
                    localStorage.getItem("theme") || "forest",
                );

                // Fetch session info
                const res = await fetch("/check-session");
                const data = await res.json();

                if (!data.loggedIn) {
                    window.location.href = "/login";
                    return;
                }

                currentUser = data;

                // PRE-FILL names immediately from session data so they aren't empty while loading
                if (data.loggedIn) {
                    if (data.firstName)
                        document.getElementById("firstName").value =
                            data.firstName;
                    if (data.lastName)
                        document.getElementById("lastName").value =
                            data.lastName;
                    if (data.middleName)
                        document.getElementById("middleName").value =
                            data.middleName;
                }

                // Fetch full profile info from /api/studentinfo (or admin info if we had a route, but for now we'll use session + session storage if needed)
                // For now, let's assume /api/studentinfo handles returning basic info for whichever user is logged in if we adjust it
                // Or just use the session data for names/pics

                // Let's adjust server.js to make /api/studentinfo more generic if needed, but for now let's use session data
                // Actually, /api/studentinfo exists, let's use it.
                const profileRes = await fetch("/api/studentinfo");
                const profileData = await profileRes.json();

                if (!profileData.error) {
                    // Populate forms
                    document.getElementById("firstName").value =
                        profileData.firstName || "";
                    document.getElementById("middleName").value =
                        profileData.middleName || "";
                    document.getElementById("lastName").value =
                        profileData.lastName || "";
                    document.getElementById("email").value =
                        profileData.email || "";
                    document.getElementById("profilePic").value =
                        profileData.profilePic ||
                        "https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky";
                    document.getElementById("avatar-preview").src =
                        document.getElementById("profilePic").value;

                    if (currentUser.role === "student") {
                        document
                            .getElementById("student-fields")
                            .classList.remove("hidden");
                        document.getElementById("course").value =
                            profileData.course || "";
                        document.getElementById("courseLevel").value =
                            profileData.courseLevel || "";
                        document.getElementById("address").value =
                            profileData.address || "";
                    }
                }
            });

            function changeAvatar() {
                const grid = document.getElementById("avatar-grid");
                grid.innerHTML = "";
                const seeds = [
                    "Felix",
                    "Aneka",
                    "Lucky",
                    "Scooter",
                    "Boots",
                    "Mochi",
                    "Pepper",
                    "Ginger",
                ];
                seeds.forEach((seed) => {
                    const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`;
                    const div = document.createElement("div");
                    div.className =
                        "avatar cursor-pointer hover:scale-110 transition-transform";
                    div.onclick = () => selectAvatar(url);
                    div.innerHTML = `<div class="w-16 h-16 rounded-xl border-2 border-transparent hover:border-primary overflow-hidden"><img src="${url}"></div>`;
                    grid.appendChild(div);
                });
                document.getElementById("avatar_modal").showModal();
            }

            function selectAvatar(url) {
                document.getElementById("avatar-preview").src = url;
                document.getElementById("profilePic").value = url;
                document.getElementById("avatar_modal").close();
            }

            function setAvatarFromUrl() {
                const url = document.getElementById("custom-avatar-url").value;
                if (url) selectAvatar(url);
            }

            function previewImage(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        document.getElementById("avatar-preview").src =
                            e.target.result;
                        // Clear the predefined picker if they upload a file
                        document.getElementById("profilePic").value = "";
                    };
                    reader.readAsDataURL(file);
                }
            }

            document.getElementById("profileForm").onsubmit = async (e) => {
                e.preventDefault();

                const formData = new FormData();
                formData.append(
                    "firstName",
                    document.getElementById("firstName").value,
                );
                formData.append(
                    "lastName",
                    document.getElementById("lastName").value,
                );
                formData.append(
                    "middleName",
                    document.getElementById("middleName").value,
                );
                formData.append(
                    "email",
                    document.getElementById("email").value,
                );

                // Only append textual profilePic (like Dicebear) if the user didn't upload a real file
                const fileInput = document.getElementById("profileImageUpload");
                if (fileInput && fileInput.files[0]) {
                    formData.append("profileImage", fileInput.files[0]);
                } else {
                    formData.append(
                        "profilePic",
                        document.getElementById("profilePic").value,
                    );
                }

                if (currentUser.role === "student") {
                    formData.append(
                        "course",
                        document.getElementById("course").value,
                    );
                    formData.append(
                        "courseLevel",
                        document.getElementById("courseLevel").value,
                    );
                    formData.append(
                        "address",
                        document.getElementById("address").value,
                    );
                }

                try {
                    const res = await fetch("/api/update-profile", {
                        method: "POST",
                        body: formData,
                    });

                    const result = await res.json();
                    if (res.ok) {
                        showToast("Profile updated successfully!", "success");
                        window.location.href =
                            currentUser.role === "admin"
                                ? "/admin"
                                : "/homepage";
                    } else {
                        showToast(
                            result.error || "Failed to update profile",
                            "error",
                        );
                    }
                } catch (err) {
                    console.error(err);
                    showToast("An error occurred", "error");
                }
            };
        </script>
            </div>
            <!-- Sidebar (Mobile drawer) -->
            <div class="drawer-side z-[200]">
                <label for="my-drawer" class="drawer-overlay"></label>
                <ul class="menu p-4 w-80 min-h-full bg-base-100 text-base-content">
                    <li class="menu-title flex flex-row items-center gap-3 py-4 border-b border-base-content/5 mb-4">
                        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-primary-content"><i class="fa-solid fa-desktop"></i></div>
                        <span class="text-xl font-black">CCS SIT-IN</span>
                    </li>
                    <li><a href="/homepage"><i class="fa-solid fa-house mr-2"></i>Home</a></li>
                    <li><a href="/student-history"><i class="fa-solid fa-clock-rotate-left mr-2"></i>History</a></li>
                    <li><a href="/leaderboard"><i class="fa-solid fa-trophy mr-2"></i>Leaderboard</a></li>
                    <li><a href="/ai-recommendations"><i class="fa-solid fa-robot mr-2"></i>AI Recs</a></li>
                    <li><a href="/lab-rules"><i class="fa-solid fa-gavel mr-2"></i>Lab Rules</a></li>
                    <li><a href="/edit-profile" class="active"><i class="fa-solid fa-user-pen mr-2"></i>Edit Profile</a></li>
                    <li><a href="#" onclick="logout()" class="text-error"><i class="fa-solid fa-right-from-bracket mr-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
        <script>
            function logout() {
                fetch("/logout", { method: "POST" })
                    .then(r => r.json())
                    .then(data => { if (data.success) window.location.href = data.redirectUrl; })
                    .catch(err => console.error("Logout error:", err));
            }
        </script>
    </body>
