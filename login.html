        <script>
            // Initial Theme Setup
            const currentTheme = localStorage.getItem("theme") || "forest";
            document.documentElement.setAttribute("data-theme", currentTheme);

            // Theme Switcher Logic
            document.querySelectorAll(".theme-controller").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const theme = btn.getAttribute("data-set-theme");
                    document.documentElement.setAttribute("data-theme", theme);
                    localStorage.setItem("theme", theme);
                });
            });

            // Login Submission Logic
            document
                .getElementById("loginForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const btn = e.target.querySelector('button[type="submit"]');
                    const originalContent = btn.innerHTML;

                    // Loading State
                    btn.disabled = true;
                    btn.innerHTML =
                        '<span class="loading loading-spinner loading-sm"></span> Authenticating...';

                    const idNumber = document.getElementById("idNumber").value;
                    const password = document.getElementById("password").value;
                    const errorDiv = document.getElementById("errorMessage");
                    const errorText = document.getElementById("errorText");

                    try {
                        const response = await fetch("/login", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ idNumber, password }),
                        });

                        const data = await response.json();

                        if (data.success) {
                            window.location.href = data.redirectUrl;
                        } else {
                            errorText.textContent =
                                data.error || "Identity verification failed";
                            errorDiv.classList.remove("hidden");
                            btn.disabled = false;
                            btn.innerHTML = originalContent;
                        }
                    } catch (err) {
                        errorText.textContent =
                            "Connection error. Please check your network.";
                        errorDiv.classList.remove("hidden");
                        btn.disabled = false;
                        btn.innerHTML = originalContent;
                    }
                });
        </script>
