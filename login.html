<!DOCTYPE html>
<html data-theme="fantasy">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - CCS Sit-In Monitoring System</title>
        <link href="src/output.css" rel="stylesheet" />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <!-- Navbar -->
        <div class="navbar bg-base-100/40 backdrop-blur-md h-16 shadow-sm flex items-center justify-between fixed z-[100] backdrop-blur-md px-8">
            <!-- Left: Logo + Name -->
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-lg flex items-center justify-center">
                    <img src="assets/ccslogo.png" alt="CCS Logo" class="w-10 h-10 object-contain">
                </div>
                <a class="btn btn-ghost text-xl font-bold">
                    <span class="text-primary">CCS</span> - Sit-In Monitoring System
                </a>
            </div>
            
            <!-- Right: Navigation Links -->
            <div class="flex items-center gap-2">
                <a href="index.html" class="btn btn-ghost btn-sm">Home</a>
                <a href="#community" class="btn btn-ghost btn-sm">Community</a>
                <a href="#about" class="btn btn-ghost btn-sm">About</a>
                <a href="login.html" class="btn btn-ghost btn-sm">Login</a>
                <a href="register.html" class="btn btn-primary btn-sm">Register</a>
            </div>
        </div>

        <!-- Login Form Section -->
        <div class="min-h-screen flex items-center justify-center pt-24 pb-12 px-8">
            <div class="w-full max-w-md">
                <!-- Form Card -->
                <div class="card bg-base-100 shadow-xl">
                    <div class="card-body p-8">
                        <!-- Header -->
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
                            <p class="text-base-content/70">Sign in to your account</p>
                        </div>

                        <!-- Login Form -->
                        <form class="space-y-4">
                            <!-- ID Number -->
                            <div class="form-control">
                                <label class="label">
                                    <span class="label-text font-medium">ID Number</span>
                                </label>
                                <input type="text" placeholder="Enter your ID Number" class="input input-bordered w-full" />
                            </div>

                            <!-- Password -->
                            <div class="form-control">
                                <label class="label">
                                    <span class="label-text font-medium">Password</span>
                                </label>
                                <input type="password" placeholder="Enter your password" class="input input-bordered w-full" />
                            </div>

                            <!-- Forgot Password -->
                            <div class="text-right">
                                <a href="#" class="text-sm text-primary hover:underline">Forgot Password?</a>
                            </div>

                            <!-- Buttons -->
                            <div class="flex gap-4 pt-4">
                                <a href="index.html" class="btn btn-outline flex-1">Cancel</a>
                                <button type="submit" class="btn btn-primary flex-1">Login</button>
                            </div>
                        </form>

                        <!-- Register Link -->
                        <div class="text-center mt-6 pt-6 border-t border-base-300">
                            <p class="text-base-content/70">
                                Don't have an account? 
                                <a href="register.html" class="text-primary font-medium hover:underline">Register here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
