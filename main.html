<!DOCTYPE html>
<html data-theme="fantasy">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Home - CCS Sit-In Monitoring System</title>
        <link href="src/output.css" rel="stylesheet" />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <!-- Drawer Navigation Component -->
        <div class="drawer">
            <input id="my-drawer" type="checkbox" class="drawer-toggle" />
            <div class="drawer-content flex flex-col">
                <!-- Mobile navbar header -->
                <div class="navbar bg-base-100/40 backdrop-blur-md h-16 shadow-sm md:hidden">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-10 rounded-lg flex items-center justify-center">
                                <img src="assets/ccslogo.png" alt="CCS Logo" class="w-10 h-10 object-contain">
                            </div>
                            <span class="text-primary font-bold text-lg">CCS</span>
                        </div>
                    </div>
                    <div class="flex-none">
                        <label for="my-drawer" class="btn btn-ghost btn-circle drawer-button">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </label>
                    </div>
                </div>

                <!-- Desktop navbar -->
                <div class="navbar bg-base-100/40 backdrop-blur-md h-16 shadow-sm hidden md:flex fixed z-[100] w-full px-8">
                    <div class="flex items-center gap-2">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center">
                            <img src="assets/ccslogo.png" alt="CCS Logo" class="w-10 h-10 object-contain">
                        </div>
                        <a href="main.html" class="btn btn-ghost text-xl font-bold">
                            <span class="text-primary">CCS</span> - Sit-In Monitoring System
                        </a>
                    </div>

                    <div class="flex items-center gap-2 ml-auto">
                        <a href="main.html" class="btn btn-ghost btn-sm">Home</a>
                        <a href="#" class="btn btn-ghost btn-sm">Dashboard</a>
                        <button onclick="logout()" class="btn btn-primary btn-sm">Logout</button>
                    </div>
                </div>

                <!-- Page Content -->
                <div class="md:pt-16">
                    <!-- Main Content Area -->
                    <div class="min-h-screen flex items-center justify-center pt-20 md:pt-0 px-4 md:px-8">
                        <div class="max-w-7xl w-full">
                            <div class="card bg-base-100 shadow-xl">
                                <div class="card-body p-6 md:p-8">
                                    <h1 class="card-title text-2xl md:text-3xl mb-4">Welcome to CCS Sit-In Monitoring System</h1>
                                    <p class="text-base-content/70 text-sm md:text-base">Content goes here...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mobile drawer menu -->
            <div class="drawer-side">
                <label for="my-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
                <ul class="menu p-4 w-80 min-h-full bg-base-200 text-base-content space-y-2">
                    <li class="mb-4">
                        <span class="text-primary font-bold text-lg">CCS - Sit-In Monitoring</span>
                    </li>
                    <li><a href="main.html">Home</a></li>
                    <li><a href="#">Dashboard</a></li>
                    <li><a href="#" onclick="logout()" class="text-error">Logout</a></li>
                </ul>
            </div>
        </div>

        <script>
            // Check if user is logged in on page load
            window.addEventListener('DOMContentLoaded', () => {
                fetch('/check-session')
                    .then(response => response.json())
                    .then(data => {
                        if (!data.loggedIn) {
                            window.location.href = '/login.html';
                        }
                    })
                    .catch(err => {
                        console.error('Error checking session:', err);
                        window.location.href = '/login.html';
                    });
            });

            // Logout function
            function logout() {
                fetch('/logout', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            window.location.href = data.redirectUrl;
                        }
                    })
                    .catch(err => console.error('Logout error:', err));
            }
        </script>
    </body>
</html>
