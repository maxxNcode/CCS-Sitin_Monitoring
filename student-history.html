        <script>
            // Check session
            window.addEventListener("DOMContentLoaded", () => {
                fetch("/check-session")
                    .then((r) => r.json())
                    .then((d) => {
                        if (!d.loggedIn) window.location.href = "/login";
                        else if (d.role === "admin")
                            window.location.href = "/admin";
                    })
                    .catch(() => (window.location.href = "/login"));

                // Initial Theme Setup
                const currentTheme = localStorage.getItem("theme") || "forest";
                document.documentElement.setAttribute(
                    "data-theme",
                    currentTheme,
                );

                // Theme Switcher Logic
                document
                    .querySelectorAll(".theme-controller")
                    .forEach((btn) => {
                        btn.addEventListener("click", () => {
                            const theme = btn.getAttribute("data-set-theme");
                            document.documentElement.setAttribute(
                                "data-theme",
                                theme,
                            );
                            localStorage.setItem("theme", theme);
                        });
                    });

                // Fetch History Records Search Event Listener
                document
                    .getElementById("searchInput")
                    .addEventListener("input", renderTable);

                // Load history on page load
                fetchHistory();
            });

            let allRecords = [];

            // History Records Fetching
            async function fetchHistory() {
                try {
                    const res = await fetch("/api/student/history");
                    allRecords = await res.json();
                    if (!res.ok) return;

                    renderTable();
                } catch (err) {
                    console.error("Failed to fetch history:", err);
                }
            }

            function renderTable() {
                const query = document
                    .getElementById("searchInput")
                    .value.toLowerCase();
                const tbody = document.getElementById("historyTableBody");
                tbody.innerHTML = "";

                const filtered = allRecords.filter(
                    (r) =>
                        r.purpose.toLowerCase().includes(query) ||
                        r.lab.toLowerCase().includes(query) ||
                        r.date.includes(query),
                );

                if (filtered.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 opacity-50 font-bold">No records found</td></tr>`;
                    return;
                }

                filtered.forEach((r) => {
                    const loginTime = new Date(r.loginTime).toLocaleTimeString(
                        [],
                        { hour: "2-digit", minute: "2-digit" },
                    );
                    const logoutTime = new Date(
                        r.logoutTime,
                    ).toLocaleTimeString([], {
                        hour: "2-digit",
                        minute: "2-digit",
                    });

                    const statusBadge =
                        r.feedbackStatus === "Pending"
                            ? `<button onclick="openFeedbackModal('${r.id}')" class="btn btn-xs btn-outline btn-warning">Share Feedback</button>`
                            : `<div class="badge badge-success badge-sm gap-1 uppercase text-[9px] font-black"><i class="fa-solid fa-check"></i> Completed</div>`;

                    tbody.innerHTML += `
                        <tr class="hover">
                            <td class="font-mono text-xs opacity-70">${r.date}</td>
                            <td class="font-mono text-xs">${loginTime}</td>
                            <td class="font-mono text-xs">${logoutTime}</td>
                            <td><div class="badge badge-primary badge-outline">${r.purpose}</div></td>
                            <td class="font-bold">${r.lab}</td>
                            <td class="text-center">${statusBadge}</td>
                        </tr>
                    `;
                });
            }

            function openFeedbackModal(historyId) {
                document.getElementById("feedbackHistoryId").value = historyId;
                document.getElementById("feedbackComments").value = "";
                // Reset rating to 5
                document.querySelector(
                    'input[name="rating-7"][value="5"]',
                ).checked = true;

                document.getElementById("feedback_modal").showModal();
            }

            async function submitFeedback() {
                const historyId =
                    document.getElementById("feedbackHistoryId").value;
                const comments =
                    document.getElementById("feedbackComments").value;
                const rating = document.querySelector(
                    'input[name="rating-7"]:checked',
                ).value;

                if (!comments.trim())
                    return showToast("Please leave a comment", "warning");

                try {
                    const res = await fetch("/api/student/feedback", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ historyId, rating, comments }),
                    });

                    const result = await res.json();

                    if (res.ok) {
                        showToast(result.message, "success");
                        document.getElementById("feedback_modal").close();
                        fetchHistory();
                    } else {
                        showToast(
                            result.error || "Failed to submit feedback",
                            "error",
                        );
                    }
                } catch (e) {
                    console.error(e);
                    showToast("An error occurred", "error");
                }
            }

            function logout() {
                fetch("/logout", { method: "POST" })
                    .then((r) => r.json())
                    .then((d) => {
                        if (d.success) window.location.href = d.redirectUrl;
                    });
            }
